name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: notesverb_test
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        strategy:
            matrix:
                node-version: [18.x, 20.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: "services/auth-service/package-lock.json"

            - name: Install dependencies
              run: |
                  cd services/auth-service
                  npm ci

            - name: Setup test database
              run: |
                  cd services/auth-service
                  npx prisma migrate deploy
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/notesverb_test

            - name: Generate Prisma client
              run: |
                  cd services/auth-service
                  npx prisma generate

            - name: Run tests
              run: |
                  cd services/auth-service
                  npm test
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/notesverb_test
                  NODE_ENV: test
                  JWT_SECRET: test_jwt_secret
                  JWT_REFRESH_SECRET: test_refresh_secret
                  JWT_EXPIRES_IN: 15m
                  JWT_REFRESH_EXPIRES_IN: 7d
                  BCRYPT_ROUNDS: 1

            - name: Upload coverage reports
              uses: codecov/codecov-action@v3
              if: matrix.node-version == '20.x'
              with:
                  directory: ./services/auth-service/coverage
                  flags: unittests
                  name: codecov-umbrella

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "npm"
                  cache-dependency-path: "services/auth-service/package-lock.json"

            - name: Install dependencies
              run: |
                  cd services/auth-service
                  npm ci

            - name: Run ESLint
              run: |
                  cd services/auth-service
                  npm run lint || echo "No lint script found"

            - name: Run TypeScript check
              run: |
                  cd services/auth-service
                  npx tsc --noEmit

    security:
        name: Security Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "npm"
                  cache-dependency-path: "services/auth-service/package-lock.json"

            - name: Install dependencies
              run: |
                  cd services/auth-service
                  npm ci

            - name: Run npm audit
              run: |
                  cd services/auth-service
                  npm audit --audit-level moderate

            - name: Run security scan
              uses: github/super-linter/slim@v5
              env:
                  DEFAULT_BRANCH: main
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VALIDATE_ALL_CODEBASE: false
                  VALIDATE_JAVASCRIPT_ES: true
                  VALIDATE_TYPESCRIPT_ES: true
                  VALIDATE_JSON: true
                  VALIDATE_YAML: true

    docker:
        name: Docker Build
        runs-on: ubuntu-latest
        needs: [test, lint, security]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  push: false
                  tags: notes-microservice:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy-staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        needs: [docker]
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Deploy to staging
              run: |
                  echo "Deploying to staging environment..."
                  # Add your staging deployment commands here
                  # For example: kubectl apply -f k8s/staging/ or docker-compose up -d

    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: [docker]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        environment: production
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Deploy to production
              run: |
                  echo "Deploying to production environment..."
                  # Add your production deployment commands here
                  # This step requires manual approval in GitHub
