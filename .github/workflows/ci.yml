name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: notesverb_test
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        strategy:
            matrix:
                node-version: [20.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
                  cache-dependency-path: services/auth-service/package-lock.json

            - name: Install dependencies
              run: |
                  cd services/auth-service
                  npm ci

            - name: Setup test database
              run: |
                  cd services/auth-service
                  npx prisma migrate deploy
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/notesverb_test

            - name: Build TypeScript
              run: |
                  cd services/auth-service
                  npm run build

            - name: Run tests
              run: |
                  cd services/auth-service
                  npm test
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/notesverb_test
                  NODE_ENV: test
                  JWT_SECRET: test_jwt_secret
                  JWT_REFRESH_SECRET: test_refresh_secret
                  JWT_EXPIRES_IN: 15m
                  JWT_REFRESH_EXPIRES_IN: 7d
                  BCRYPT_ROUNDS: 1

            - name: Upload coverage reports
              uses: codecov/codecov-action@v3
              with:
                  directory: ./services/auth-service/coverage
                  flags: unittests
                  name: codecov-umbrella

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: npm
                  cache-dependency-path: services/auth-service/package-lock.json

            - name: Validate package.json
              run: |
                  cd services/auth-service
                  # Check if all required scripts exist
                  required_scripts=("build" "start" "lint" "test")
                  for script in "${required_scripts[@]}"; do
                    if ! npm run | grep -q "^  $script$"; then
                      echo "Required script '$script' is missing in package.json!"
                      exit 1
                    fi
                  done
                  echo "All required scripts present ✅"

            - run: |
                  cd services/auth-service
                  npm ci

            - name: Run ESLint
              run: |
                  cd services/auth-service
                  npm run lint

            - name: Check build size
              run: |
                  cd services/auth-service
                  npm run build
                  # Check if dist directory exists and has reasonable size
                  if [ ! -d "dist" ]; then
                    echo "Build failed - dist directory not found!"
                    exit 1
                  fi
                  build_size=$(du -sb dist | cut -f1)
                  max_size=$((50*1024*1024)) # 50MB
                  if [ "$build_size" -gt "$max_size" ]; then
                    echo "Build size ($build_size bytes) exceeds limit ($max_size bytes)!"
                    exit 1
                  fi
                  echo "Build size: $build_size bytes ✅"

    security:
        name: Security Scan
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: npm
                  cache-dependency-path: services/auth-service/package-lock.json

            - run: |
                  cd services/auth-service
                  npm ci

            - name: Run npm audit
              run: |
                  cd services/auth-service
                  npm audit --audit-level moderate

            - name: Run security scan
              uses: github/super-linter/slim@v5
              env:
                  DEFAULT_BRANCH: main
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VALIDATE_ALL_CODEBASE: false
                  VALIDATE_JAVASCRIPT_ES: true
                  VALIDATE_TYPESCRIPT_ES: true
                  VALIDATE_JSON: true
                  VALIDATE_YAML: true

    docker:
        name: Docker Build
        runs-on: ubuntu-latest
        needs: [test, lint, security]

            - name: Validate Docker context
              run: |
                  # Check if all required files exist
                  required_files=("Dockerfile" "healthcheck.js" "services/auth-service/package.json" "services/auth-service/src/index.ts")
                  for file in "${required_files[@]}"; do
                    if [ ! -f "$file" ]; then
                      echo "Required file $file is missing!"
                      exit 1
                    fi
                  done
                  echo "All required files present ✅"

            - name: Test Docker image
              run: |
                  # Build and test the Docker image
                  docker build -t test-image .
                  # Start container in background
                  docker run -d --name test-container -p 3001:3001 \
                    -e DATABASE_URL="postgresql://test:test@localhost:5432/test" \
                    -e JWT_SECRET="test_secret" \
                    -e JWT_REFRESH_SECRET="test_refresh_secret" \
                    -e NODE_ENV="test" \
                    test-image
                  # Wait for health check
                  timeout 30 bash -c 'until curl -f http://localhost:3001/health; do sleep 2; done'
                  # Clean up
                  docker stop test-container
                  docker rm test-container

    deploy-staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        needs: [docker]
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

        steps:
            - run: echo "Deploying to staging..."

    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: [docker]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

            - name: Generate CI summary
              if: always()
              run: |
                  echo "## CI Summary 📊" >> $GITHUB_STEP_SUMMARY
                  echo "- ✅ Tests: ${{ job.status == 'success' && 'Passed' || 'Failed' }}" >> $GITHUB_STEP_SUMMARY
                  echo "- ✅ Linting: ${{ job.status == 'success' && 'Passed' || 'Failed' }}" >> $GITHUB_STEP_SUMMARY
                  echo "- ✅ Security: ${{ job.status == 'success' && 'Passed' || 'Failed' }}" >> $GITHUB_STEP_SUMMARY
                  echo "- ✅ Docker: ${{ job.status == 'success' && 'Passed' || 'Failed' }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Node.js: 20.x | Tests: 16 | Coverage: Generated" >> $GITHUB_STEP_SUMMARY
